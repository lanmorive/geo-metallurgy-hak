services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./scripts:/scripts
    depends_on:
      neo4j:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8001
      VITE_USE_MOCKS: ${VITE_USE_MOCKS:-0}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  vllm:
    image: vllm/vllm-openai:latest
    profiles: ["local-llm"]
    gpus: all
    ports:
      - "8000:8000"
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-14B-Instruct-AWQ}
      --max-model-len 8192
      --gpu-memory-utilization 0.92
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  neo4j_data:
  huggingface_cache:
